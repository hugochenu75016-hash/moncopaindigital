<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page en travaux · Mon Copain Digital</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;family=Poppins:wght@400;500;600&amp;display=swap">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{ --bg:#FF7A00; --ink:#4d2000; --cream:#fff8ef; --stroke:#7a3300; }
  html,body{height:100%;}
  body{
    font-family:'Poppins',sans-serif; color:#fff;
    background:radial-gradient(circle at 50% 20%, #ff8f1f 0%, #FF7A00 45%, #e8600a 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:28px; overflow:hidden; position:relative;
  }
  /* nuages décoratifs */
  .cloud{position:absolute;background:rgba(255,255,255,.14);border-radius:50%;filter:blur(2px);animation:float 9s ease-in-out infinite;}
  .c1{width:150px;height:150px;top:12%;left:8%;animation-delay:0s;}
  .c2{width:90px;height:90px;top:22%;right:12%;animation-delay:1.5s;}
  .c3{width:120px;height:120px;bottom:14%;left:16%;animation-delay:3s;}
  .c4{width:70px;height:70px;bottom:22%;right:18%;animation-delay:2s;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

  .card{
    position:relative; z-index:2; width:100%; max-width:560px; text-align:center;
    background:rgba(255,248,239,0.14); border:1px solid rgba(255,255,255,0.35);
    border-radius:34px; padding:clamp(34px,5vw,54px) clamp(26px,5vw,48px);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 26px 70px rgba(120,50,0,.32);
  }
  .logo{width:min(64vw,230px);height:auto;margin:0 auto 26px;display:block;filter:drop-shadow(0 10px 22px rgba(90,40,0,.4));}

  .gear{
    width:96px;height:96px;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;
    background:#fff8ef;border-radius:26px;box-shadow:0 12px 28px rgba(120,50,0,.35);
  }
  .gear svg{width:56px;height:56px;color:#e8600a;animation:spin 6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .kicker{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:13px;color:#ffe6b8;margin-bottom:12px;}
  h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(30px,6vw,46px);line-height:1.05;margin-bottom:16px;color:#fff;text-shadow:0 3px 0 rgba(122,51,0,.35);}
  h1 em{font-style:normal;display:block;color:#fff2c8;}
  p.lead{font-size:clamp(15px,2.2vw,18px);line-height:1.6;color:#fff3e2;max-width:40ch;margin:0 auto 30px;}

  .cta{
    display:inline-flex;align-items:center;gap:9px;font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:16px;color:#a54a00;background:#fff8ef;text-decoration:none;
    padding:14px 26px;border-radius:16px;box-shadow:0 10px 24px rgba(120,50,0,.35);
    transition:transform .16s, box-shadow .16s;
  }
  .cta:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(120,50,0,.45);}
  .cta svg{width:18px;height:18px;}

  .foot{margin-top:30px;font-size:13px;color:rgba(255,240,220,.8);}
  .foot a{color:#fff;font-weight:600;text-decoration:none;}
  .socials{display:flex;gap:14px;justify-content:center;margin-top:16px;}
  .socials a{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;transition:background .16s;}
  .socials a:hover{background:rgba(255,255,255,.3);}
  .socials svg{width:20px;height:20px;color:#fff;}
</style>
</head>
<body>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div>

  <div class="card">
    <img class="logo" src="https://moncopaindigital.fr/logomcd.png" alt="Mon Copain Digital">

    <div class="gear">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
      </svg>
    </div>

    <p class="kicker">On bricole dans la Bulle</p>
    <h1>Page en travaux <em>ça arrive très vite !</em></h1>
    <p class="lead">On peaufine quelque chose de sympa pour vous. Revenez dans quelques instants — ou retrouvez-nous en attendant.</p>

    <a class="cta" href="https://moncopaindigital.fr/index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      Retour à l'accueil
    </a>

    <div class="socials">
      <a href="https://www.instagram.com/moncopaindigital/" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="https://www.linkedin.com/" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5ZM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05C20.2 8.65 21 11 21 14.1V21h-4v-6c0-1.43-.03-3.27-2-3.27-2 0-2.3 1.56-2.3 3.17V21H9z"/></svg>
      </a>
    </div>

    <div class="foot">© 2026 Mon Copain Digital · <a href="https://moncopaindigital.fr/contact.html">Nous contacter</a></div>
  </div>
</body>
</html>
