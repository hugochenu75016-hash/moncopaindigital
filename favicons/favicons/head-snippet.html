<!-- =========================================================
     Mon Copain Digital — favicons
     Copie/colle ce bloc dans le <head> de CHAQUE page HTML.
     (Le dossier /favicons/ doit être à la racine de ton site.)
     ========================================================= -->

<!-- Onglet navigateur (classique + Google) -->
<link rel="icon" href="/favicons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicons/favicon-48.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicons/favicon-96.png">

<!-- iPhone / iPad / Android (ajout à l'écran d'accueil) -->
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">

<!-- PWA / installation -->
<link rel="manifest" href="/favicons/site.webmanifest">
<meta name="theme-color" content="#F3852B">
