<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda 2026 · Mon Copain Digital</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;}
  :root{
    --ink:#1c2230; --muted:#6b7280; --line:#e6e8ee; --bg:#f6f7f9; --card:#ffffff;
    --accent:#e8690d; --accent-soft:#fff1e6;
    --green:#188a52; --green-soft:#e6f5ec; --red:#c33b3b; --red-soft:#fbeaea; --amber:#b7791f; --amber-soft:#fdf3e2;
  }
  html,body{margin:0;height:100%;}
  body{font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  a{color:var(--accent);}

  /* ---------- Login ---------- */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;z-index:50;}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:34px 30px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(20,30,50,.08);}
  .login-card h1{font-size:20px;margin:0 0 4px;}
  .login-card p{color:var(--muted);font-size:14px;margin:0 0 22px;}
  .login-card label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px;}
  .login-card input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px;outline:none;}
  .login-card input:focus{border-color:var(--accent);}
  .login-card button{width:100%;margin-top:20px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;}
  .login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:16px;}

  /* ---------- App ---------- */
  #app{display:none;min-height:100vh;flex-direction:column;}
  #app.show{display:flex;}
  header.top{background:var(--card);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:20;}
  header.top .brand{font-weight:700;font-size:16px;letter-spacing:-.01em;}
  header.top .brand span{color:var(--accent);}
  .spacer{flex:1;}
  .nav-btns{display:flex;align-items:center;gap:8px;}
  .icon-btn{width:36px;height:36px;border:1px solid var(--line);background:var(--card);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .icon-btn:hover{background:var(--bg);}
  .today-btn{padding:0 14px;height:36px;border:1px solid var(--line);background:var(--card);border-radius:9px;font-size:14px;font-weight:600;}
  .today-btn:hover{background:var(--bg);}
  .month-title{font-size:20px;font-weight:700;min-width:210px;text-transform:capitalize;}
  .ghost{padding:0 14px;height:36px;border:1px solid var(--line);background:var(--card);border-radius:9px;font-size:14px;color:var(--muted);}
  .ghost:hover{background:var(--bg);}
  .primary{padding:0 16px;height:36px;border:none;background:var(--accent);color:#fff;border-radius:9px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;}

  main{flex:1;padding:22px;max-width:1200px;width:100%;margin:0 auto;}
  .cal{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(20,30,50,.04);}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);background:#fbfbfc;border-bottom:1px solid var(--line);}
  .dow div{padding:10px 12px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:left;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .cell{min-height:118px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:4px;position:relative;cursor:pointer;transition:background .12s;}
  .cell:nth-child(7n){border-right:none;}
  .cell:hover{background:#fcfcfd;}
  .cell.out{background:#fafafb;cursor:default;}
  .cell.out:hover{background:#fafafb;}
  .cell.out .dn{color:#c4c8d0;}
  .dn{font-size:13px;font-weight:600;color:var(--ink);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;}
  .cell.today .dn{background:var(--accent);color:#fff;}
  .ev{font-size:12px;line-height:1.25;padding:3px 6px;border-radius:6px;background:var(--accent-soft);color:#8a3d02;border-left:3px solid var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
  .ev .h{font-weight:700;}
  .ev.st-cancelled{background:var(--red-soft);color:var(--red);border-left-color:var(--red);text-decoration:line-through;opacity:.75;}
  .ev.st-pending{background:var(--amber-soft);color:var(--amber);border-left-color:var(--amber);}
  .more{font-size:11px;color:var(--muted);font-weight:600;padding-left:6px;}
  .empty-hint{padding:60px 20px;text-align:center;color:var(--muted);}

  /* ---------- Panel (jour) ---------- */
  .scrim{position:fixed;inset:0;background:rgba(15,20,32,.4);opacity:0;pointer-events:none;transition:opacity .18s;z-index:30;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .panel{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--card);box-shadow:-14px 0 40px rgba(20,30,50,.14);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:31;display:flex;flex-direction:column;}
  .panel.show{transform:none;}
  .panel-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;}
  .panel-head h2{font-size:17px;margin:0;text-transform:capitalize;}
  .panel-head .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .panel-body{flex:1;overflow-y:auto;padding:18px 22px;}
  .rdv{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
  .rdv .r-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .rdv .r-time{font-weight:700;font-size:15px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;}
  .b-confirmed{background:var(--green-soft);color:var(--green);}
  .b-pending{background:var(--amber-soft);color:var(--amber);}
  .b-cancelled{background:var(--red-soft);color:var(--red);}
  .rdv .r-title{font-weight:600;font-size:15px;margin-bottom:6px;}
  .rdv .r-row{font-size:13px;color:var(--muted);margin:3px 0;display:flex;gap:7px;}
  .rdv .r-row b{color:var(--ink);font-weight:600;}
  .rdv .r-notes{font-size:13px;color:var(--ink);background:var(--bg);border-radius:8px;padding:8px 10px;margin-top:8px;white-space:pre-wrap;}
  .rdv .r-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .mini{font-size:12px;padding:5px 10px;border:1px solid var(--line);background:var(--card);border-radius:7px;color:var(--ink);}
  .mini:hover{background:var(--bg);}
  .mini.danger{color:var(--red);border-color:var(--red-soft);}
  .mini.ok{color:var(--green);border-color:var(--green-soft);}
  .day-empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 0;}
  .panel-foot{padding:14px 22px;border-top:1px solid var(--line);}
  .panel-foot button{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:14px;}

  /* ---------- Modal (ajout / édition) ---------- */
  .modal-scrim{position:fixed;inset:0;background:rgba(15,20,32,.5);display:none;align-items:center;justify-content:center;z-index:40;padding:20px;}
  .modal-scrim.show{display:flex;}
  .modal{background:var(--card);border-radius:16px;max-width:440px;width:100%;padding:24px;max-height:92vh;overflow-y:auto;}
  .modal h3{margin:0 0 18px;font-size:18px;}
  .fld{margin-bottom:13px;}
  .fld label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;}
  .fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;outline:none;}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent);}
  .fld textarea{resize:vertical;min-height:64px;}
  .fld-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions button{flex:1;padding:11px;border-radius:10px;font-weight:600;font-size:14px;border:1px solid var(--line);background:var(--card);}
  .modal-actions .save{background:var(--accent);color:#fff;border:none;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .2s;z-index:60;}
  .toast.show{opacity:1;}

  @media(max-width:640px){
    .month-title{min-width:auto;font-size:17px;}
    .cell{min-height:82px;padding:5px;}
    .ev{font-size:10px;padding:2px 4px;}
    header.top{flex-wrap:wrap;gap:10px;}
  }
</style>
</head>
<body>

<!-- ===== Login ===== -->
<div id="login">
  <form class="login-card" id="login-form">
    <h1>Agenda — Mon <span style="color:#e8690d">Copain Digital</span></h1>
    <p>Espace réservé. Connectez-vous avec votre compte administrateur.</p>
    <label for="lg-email">Email</label>
    <input id="lg-email" type="email" autocomplete="email" required>
    <label for="lg-pass">Mot de passe</label>
    <input id="lg-pass" type="password" autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
    <div class="login-err" id="lg-err"></div>
  </form>
</div>

<!-- ===== App ===== -->
<div id="app">
  <header class="top">
    <div class="brand">Agenda <span>·</span> Mon Copain Digital</div>
    <div class="nav-btns">
      <button class="icon-btn" id="prev" aria-label="Mois précédent"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="today-btn" id="today">Aujourd'hui</button>
      <button class="icon-btn" id="next" aria-label="Mois suivant"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    <div class="month-title" id="month-title">—</div>
    <div class="spacer"></div>
    <button class="primary" id="add-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Nouveau</button>
    <button class="ghost" id="logout">Déconnexion</button>
  </header>

  <main>
    <div class="cal">
      <div class="dow"><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div></div>
      <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

<!-- ===== Panneau jour ===== -->
<div class="scrim" id="scrim"></div>
<div class="panel" id="panel">
  <div class="panel-head">
    <div style="flex:1">
      <h2 id="panel-title">—</h2>
      <div class="sub" id="panel-sub"></div>
    </div>
    <button class="icon-btn" id="panel-close" aria-label="Fermer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-foot"><button id="panel-add">+ Ajouter un rendez-vous ce jour</button></div>
</div>

<!-- ===== Modal ajout/édition ===== -->
<div class="modal-scrim" id="modal-scrim">
  <div class="modal">
    <h3 id="modal-title">Nouveau rendez-vous</h3>
    <div class="fld-row">
      <div class="fld"><label>Date</label><input type="date" id="m-date"></div>
      <div class="fld"><label>Heure</label><select id="m-heure"></select></div>
    </div>
    <div class="fld"><label>Titre</label><input type="text" id="m-titre" placeholder="Audit gratuit, Suivi projet…"></div>
    <div class="fld"><label>Client (nom)</label><input type="text" id="m-nom" placeholder="Nom du client"></div>
    <div class="fld-row">
      <div class="fld"><label>Email</label><input type="email" id="m-email" placeholder="client@email.com"></div>
      <div class="fld"><label>Téléphone</label><input type="tel" id="m-tel" placeholder="06…"></div>
    </div>
    <div class="fld-row">
      <div class="fld"><label>Type de RDV</label><select id="m-type">
        <option>Audit gratuit</option><option>Création de site web</option><option>Refonte de site existant</option>
        <option>Référencement / SEO</option><option>Réseaux sociaux</option><option>Identité visuelle / branding</option>
        <option>Suivi projet</option><option>Autre</option>
      </select></div>
      <div class="fld"><label>Statut</label><select id="m-status">
        <option value="confirmed">Confirmé</option><option value="pending">En attente</option><option value="cancelled">Annulé</option>
      </select></div>
    </div>
    <div class="fld"><label>Notes</label><textarea id="m-notes" placeholder="Notes internes…"></textarea></div>
    <div class="modal-actions">
      <button id="modal-cancel">Annuler</button>
      <button class="save" id="modal-save">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  var SB_URL='https://nlesboqlnnpnmwlpvhif.supabase.co';
  var SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZXNib3Fsbm5wbm13bHB2aGlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTE3NzEsImV4cCI6MjA5ODY4Nzc3MX0.vwu9FGgl4cXZ8KExSeL3IrgWjxIbhvDYKeSWP9sb7X8';
  var ADMIN_EMAILS=['hugo.chenu@moncopaindigital.fr','hugochenu@moncopaindigital.fr','hugochenu75016@gmail.com'];
  var sb=window.supabase.createClient(SB_URL,SB_ANON);

  var MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  var events=[];            // toutes les lignes rendez_vous
  var view=new Date(); view=new Date(view.getFullYear(), view.getMonth(), 1); // mois courant
  var editingId=null;

  function $(s){return document.querySelector(s);}
  function pad2(n){return ('0'+n).slice(-2);}
  function isoDate(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'-');}
  var STATUS_LABEL={confirmed:'Confirmé',pending:'En attente',cancelled:'Annulé'};
  function statusKey(s){s=String(s||'').toLowerCase();if(s.indexOf('annul')!==-1||s.indexOf('cancel')!==-1)return 'cancelled';if(s.indexOf('attente')!==-1||s.indexOf('pend')!==-1)return 'pending';return 'confirmed';}
  function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

  // Heures 08:00 -> 19:00 (par 30 min)
  (function(){var sel=$('#m-heure');for(var h=8;h<=19;h++){[0,30].forEach(function(m){if(h===19&&m===30)return;var v=pad2(h)+':'+pad2(m);var o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});}})();

  /* ---------- Auth ---------- */
  function isAdmin(u){return u&&ADMIN_EMAILS.indexOf(String(u.email||'').toLowerCase())!==-1;}

  $('#login-form').addEventListener('submit',async function(e){
    e.preventDefault();
    var err=$('#lg-err');err.textContent='';
    var email=$('#lg-email').value.trim(), pass=$('#lg-pass').value;
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){err.textContent='Identifiants incorrects.';return;}
    if(!isAdmin(r.data.user)){err.textContent='Accès réservé à l\'administrateur.';await sb.auth.signOut();return;}
    enterApp();
  });

  $('#logout').addEventListener('click',async function(){await sb.auth.signOut();location.reload();});

  async function boot(){
    try{var s=await sb.auth.getSession();if(s&&s.data&&s.data.session&&isAdmin(s.data.session.user)){enterApp();return;}}catch(e){}
    $('#login').style.display='flex';
  }

  async function enterApp(){
    $('#login').style.display='none';
    $('#app').classList.add('show');
    await loadEvents();
    render();
    openDay(isoDate(new Date())); // ouvre automatiquement aujourd'hui
  }

  /* ---------- Données ---------- */
  async function loadEvents(){
    try{
      var r=await sb.from('rendez_vous').select('*').order('date',{ascending:true});
      events=(r&&r.data)?r.data:[];
    }catch(e){events=[];}
  }

  function eventsOn(iso){
    return events.filter(function(e){return String(e.date).slice(0,10)===iso;})
      .sort(function(a,b){return String(a.heure||'').localeCompare(String(b.heure||''));});
  }

  /* ---------- Rendu calendrier ---------- */
  function render(){
    var y=view.getFullYear(), m=view.getMonth();
    $('#month-title').textContent=MONTHS[m]+' '+y;
    var first=new Date(y,m,1);
    var startDow=(first.getDay()+6)%7; // lundi=0
    var start=new Date(y,m,1-startDow);
    var todayIso=isoDate(new Date());
    var grid=$('#grid');grid.innerHTML='';
    for(var i=0;i<42;i++){
      var d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);
      var iso=isoDate(d);
      var out=d.getMonth()!==m;
      var cell=document.createElement('div');
      cell.className='cell'+(out?' out':'')+(iso===todayIso?' today':'');
      cell.setAttribute('data-iso',iso);
      var evs=eventsOn(iso);
      var html='<div class="dn">'+d.getDate()+'</div>';
      evs.slice(0,3).forEach(function(e){
        html+='<div class="ev st-'+statusKey(e.status)+'"><span class="h">'+esc(e.heure||'')+'</span> '+esc(e.titre||e.type||'RDV')+'</div>';
      });
      if(evs.length>3) html+='<div class="more">+'+(evs.length-3)+' autre'+(evs.length-3>1?'s':'')+'</div>';
      cell.innerHTML=html;
      if(!out){ (function(iso){ cell.addEventListener('click',function(){openDay(iso);}); })(iso); }
      grid.appendChild(cell);
    }
  }

  $('#prev').addEventListener('click',function(){view.setMonth(view.getMonth()-1);render();});
  $('#next').addEventListener('click',function(){view.setMonth(view.getMonth()+1);render();});
  $('#today').addEventListener('click',function(){var n=new Date();view=new Date(n.getFullYear(),n.getMonth(),1);render();});

  /* ---------- Panneau jour ---------- */
  var currentDayIso=null;
  function openDay(iso){
    currentDayIso=iso;
    var d=new Date(iso+'T00:00:00');
    var DOW=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    $('#panel-title').textContent=DOW[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()];
    var evs=eventsOn(iso);
    $('#panel-sub').textContent=evs.length?(evs.length+' rendez-vous'):'Aucun rendez-vous';
    var body=$('#panel-body');
    if(!evs.length){ body.innerHTML='<div class="day-empty">Aucun rendez-vous ce jour.</div>'; }
    else{
      body.innerHTML=evs.map(function(e){
        var st=statusKey(e.status);
        var stLabel=STATUS_LABEL[st];
        var rows='';
        if(e.nom) rows+='<div class="r-row"><span>👤</span><b>'+esc(e.nom)+'</b></div>';
        if(e.email) rows+='<div class="r-row"><span>✉️</span><a href="mailto:'+esc(e.email)+'">'+esc(e.email)+'</a></div>';
        if(e.tel) rows+='<div class="r-row"><span>📞</span><a href="tel:'+esc(e.tel)+'">'+esc(e.tel)+'</a></div>';
        if(e.type) rows+='<div class="r-row"><span>🏷️</span>'+esc(e.type)+'</div>';
        var notes=e.notes?'<div class="r-notes">'+esc(e.notes)+'</div>':'';
        return '<div class="rdv">'+
          '<div class="r-top"><span class="r-time">'+esc(e.heure||'—')+'</span><span class="badge b-'+st+'">'+esc(stLabel)+'</span></div>'+
          '<div class="r-title">'+esc(e.titre||e.type||'Rendez-vous')+'</div>'+
          rows+notes+
          '<div class="r-actions">'+
            (st!=='confirmed'?'<button class="mini ok" data-act="status" data-id="'+e.id+'" data-v="confirmed">✓ Confirmer</button>':'')+
            (st!=='pending'?'<button class="mini" data-act="status" data-id="'+e.id+'" data-v="pending">En attente</button>':'')+
            (st!=='cancelled'?'<button class="mini" data-act="status" data-id="'+e.id+'" data-v="cancelled">Annuler</button>':'')+
            '<button class="mini" data-act="edit" data-id="'+e.id+'">Modifier</button>'+
            '<button class="mini danger" data-act="del" data-id="'+e.id+'">Supprimer</button>'+
          '</div>'+
        '</div>';
      }).join('');
    }
    $('#scrim').classList.add('show');
    $('#panel').classList.add('show');
  }
  function closePanel(){$('#scrim').classList.remove('show');$('#panel').classList.remove('show');}
  $('#panel-close').addEventListener('click',closePanel);
  $('#scrim').addEventListener('click',closePanel);
  $('#panel-add').addEventListener('click',function(){openModal(null,currentDayIso);});

  $('#panel-body').addEventListener('click',async function(e){
    var b=e.target.closest('[data-act]');if(!b)return;
    var act=b.getAttribute('data-act'), id=b.getAttribute('data-id');
    if(act==='status'){ await setStatus(id,b.getAttribute('data-v')); }
    else if(act==='edit'){ var ev=events.find(function(x){return String(x.id)===String(id);}); openModal(ev,ev.date); }
    else if(act==='del'){ if(confirm('Supprimer ce rendez-vous ?')) await delEvent(id); }
  });

  async function setStatus(id,v){
    try{await sb.from('rendez_vous').update({status:v}).eq('id',id);}catch(e){}
    var ev=events.find(function(x){return String(x.id)===String(id);});if(ev)ev.status=v;
    render();openDay(currentDayIso);toast('Statut mis à jour');
  }
  async function delEvent(id){
    try{await sb.from('rendez_vous').delete().eq('id',id);}catch(e){}
    events=events.filter(function(x){return String(x.id)!==String(id);});
    render();openDay(currentDayIso);toast('Rendez-vous supprimé');
  }

  /* ---------- Modal ajout/édition ---------- */
  function openModal(ev,iso){
    editingId=ev?ev.id:null;
    $('#modal-title').textContent=ev?'Modifier le rendez-vous':'Nouveau rendez-vous';
    $('#m-date').value=ev?String(ev.date).slice(0,10):(iso||isoDate(new Date()));
    $('#m-heure').value=ev&&ev.heure?ev.heure:'09:00';
    $('#m-titre').value=ev?(ev.titre||''):'';
    $('#m-nom').value=ev?(ev.nom||''):'';
    $('#m-email').value=ev?(ev.email||''):'';
    $('#m-tel').value=ev?(ev.tel||''):'';
    $('#m-type').value=ev?(ev.type||'Audit gratuit'):'Audit gratuit';
    $('#m-status').value=ev?statusKey(ev.status):'confirmed';
    $('#m-notes').value=ev?(ev.notes||''):'';
    $('#modal-scrim').classList.add('show');
  }
  function closeModal(){$('#modal-scrim').classList.remove('show');editingId=null;}
  $('#modal-cancel').addEventListener('click',closeModal);
  $('#add-btn').addEventListener('click',function(){openModal(null,isoDate(new Date()));});
  $('#modal-scrim').addEventListener('click',function(e){if(e.target===this)closeModal();});

  $('#modal-save').addEventListener('click',async function(){
    var obj={
      date:$('#m-date').value, heure:$('#m-heure').value,
      titre:$('#m-titre').value.trim()||$('#m-type').value,
      nom:$('#m-nom').value.trim()||null, email:$('#m-email').value.trim()||null,
      tel:$('#m-tel').value.trim()||null, type:$('#m-type').value,
      status:$('#m-status').value, notes:$('#m-notes').value.trim()||null
    };
    if(!obj.date){toast('Choisissez une date');return;}
    if(editingId){
      try{await sb.from('rendez_vous').update(obj).eq('id',editingId);}catch(e){}
      var ev=events.find(function(x){return String(x.id)===String(editingId);});if(ev)Object.assign(ev,obj);
      toast('Rendez-vous modifié');
    }else{
      var row=null;
      try{var r=await sb.from('rendez_vous').insert(obj).select().single();if(r&&r.data)row=r.data;}catch(e){}
      if(!row)row=Object.assign({id:'tmp_'+Date.now()},obj);
      events.push(row);
      toast('Rendez-vous ajouté');
    }
    closeModal();render();
    if($('#panel').classList.contains('show'))openDay(currentDayIso);
  });

  document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closePanel();}});

  boot();
})();
</script>
</body>
</html>
